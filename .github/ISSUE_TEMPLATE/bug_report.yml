name: Bug report
description: Share the details needed to reproduce a Nova issue
title: "[Bug]: "
labels: bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a Nova bug report.

        Before filing:

        - retry on the latest public Nova release
        - note which host software you are using
        - include screenshots, recordings, or logs when they help explain the issue

  - type: textarea
    id: describe-bug
    attributes:
      label: Describe the bug
      description: A clear summary of what went wrong.
    validations:
      required: true

  - type: textarea
    id: steps-reproduce
    attributes:
      label: Steps to reproduce
      description: List the exact steps, including host selection, pairing, launch flow, and in-stream actions if relevant.
    validations:
      required: true

  - type: dropdown
    id: install-source
    attributes:
      label: Install source
      description: How did you install Nova?
      options:
        - GitHub Releases
        - Obtainium
        - GitHub Store
        - Local debug build
        - Other
    validations:
      required: true

  - type: input
    id: nova-version
    attributes:
      label: Nova version
      description: Release tag, APK version, or commit SHA.
      placeholder: e.g. v1.0.0
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Android device
      description: Device model and Android version.
      placeholder: e.g. Retroid Pocket 6, Android 13
    validations:
      required: true

  - type: dropdown
    id: host-software
    attributes:
      label: Host software
      description: Which host was Nova paired with?
      options:
        - Polaris
        - Sunshine
        - Other Moonlight-compatible host
        - Unknown
    validations:
      required: true

  - type: input
    id: host-version
    attributes:
      label: Host version and OS
      description: Host software version plus OS/distro when known.
      placeholder: e.g. Polaris v1.0.1 on Fedora 42
    validations:
      required: false

  - type: dropdown
    id: issue-area
    attributes:
      label: Issue area
      options:
        - Pairing / discovery
        - Library / launch
        - Streaming video
        - Audio
        - Input / controller / gyro
        - Quick menu / HUD
        - Watch mode
        - Install / update
        - Crash / freeze
        - Other
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: false

  - type: textarea
    id: comparison
    attributes:
      label: Comparison with another client
      description: If you tried Moonlight or another client against the same host, what happened there?
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste Nova, Android, or host logs that help explain the issue. Remove secrets before posting.
      render: Shell
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or recordings
      description: Add screenshots, recordings, or photos if the issue is visual, input-related, or hard to describe.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Network details, stream settings, affected games, or anything else that may help reproduce the problem.
    validations:
      required: false
