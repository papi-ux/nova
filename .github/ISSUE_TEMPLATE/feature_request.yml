name: Feature request
description: Suggest an idea for Nova
title: "[Feature]: "
labels: enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea for Nova.

  - type: textarea
    id: problem
    attributes:
      label: What problem should this solve?
      description: Describe the gap, friction, or missing capability.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: What would you like Nova to do?
      description: Describe the behavior, UI, or workflow you want.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Pairing / discovery
        - Library / launch
        - Streaming quality
        - Input / controller / gyro
        - Quick menu / HUD
        - Watch mode
        - Polaris integration
        - Install / update
        - Documentation
        - Other
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any workarounds or other approaches you considered.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add screenshots, mockups, example workflows, or device details if helpful.
    validations:
      required: false
