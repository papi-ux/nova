name: Build Nova APK

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Install NDK
      run: sdkmanager "ndk;27.0.12077973"

    - name: Build release APK
      run: ./gradlew assembleNonRoot_gameRelease

    - name: Sign APK
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/keystore.jks

        # Find the unsigned APK
        APK=$(find app/build/outputs/apk/nonRoot_game/release -name "*arm64*unsigned*.apk" | head -1)
        SIGNED_APK="${APK/unsigned/signed}"

        # Align
        ${ANDROID_HOME}/build-tools/$(ls ${ANDROID_HOME}/build-tools/ | tail -1)/zipalign -v 4 "$APK" "${APK}.aligned"

        # Sign with apksigner (v2+v3 signing)
        ${ANDROID_HOME}/build-tools/$(ls ${ANDROID_HOME}/build-tools/ | tail -1)/apksigner sign \
          --ks /tmp/keystore.jks \
          --ks-key-alias ${{ secrets.KEY_ALIAS }} \
          --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
          --key-pass pass:${{ secrets.KEY_PASSWORD }} \
          --out "$SIGNED_APK" \
          "${APK}.aligned"

        echo "SIGNED_APK=$SIGNED_APK" >> $GITHUB_ENV

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      continue-on-error: true  # Don't block release if artifact storage is full
      with:
        name: nova-signed
        path: app/build/outputs/apk/nonRoot_game/release/*signed*.apk
        if-no-files-found: error
        retention-days: 3  # Prevent storage quota buildup

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: app/build/outputs/apk/nonRoot_game/release/*signed*.apk
        generate_release_notes: true
        draft: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
