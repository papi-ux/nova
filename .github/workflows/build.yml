name: Build Nova APK

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  verify:
    name: Lint and unit test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;27.0.12077973"

      - name: Lint debug build
        run: ./gradlew -PnovaAbis=x86_64 -PlintFailOnError=true lintNonRoot_gameDebug

      - name: Run JVM tests
        run: ./gradlew -PnovaAbis=x86_64 testNonRoot_gameDebugUnitTest

  android-smoke:
    name: Emulator smoke test
    needs: verify
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;27.0.12077973"

      - name: Run instrumentation smoke test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: pixel_6
          target: google_apis
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: ./gradlew -PnovaAbis=x86_64 connectedNonRoot_gameDebugAndroidTest

  build:
    name: Assemble release APK
    needs: [verify, android-smoke]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      HAS_KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 != '' }}

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;27.0.12077973"

      - name: Build release APK
        run: ./gradlew assembleNonRoot_gameRelease

      - name: Sign APK
        if: github.event_name != 'pull_request' && env.HAS_KEYSTORE_BASE64 == 'true'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/keystore.jks

          APK=$(find app/build/outputs/apk/nonRoot_game/release -name "*arm64*unsigned*.apk" | head -1)
          SIGNED_APK="${APK/unsigned/signed}"

          ${ANDROID_HOME}/build-tools/$(ls ${ANDROID_HOME}/build-tools/ | tail -1)/zipalign -v 4 "$APK" "${APK}.aligned"

          ${ANDROID_HOME}/build-tools/$(ls ${ANDROID_HOME}/build-tools/ | tail -1)/apksigner sign \
            --ks /tmp/keystore.jks \
            --ks-key-alias ${{ secrets.KEY_ALIAS }} \
            --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --key-pass pass:${{ secrets.KEY_PASSWORD }} \
            --out "$SIGNED_APK" \
            "${APK}.aligned"

          echo "SIGNED_APK=$SIGNED_APK" >> $GITHUB_ENV

      - name: Select APK artifact
        run: |
          if [ -n "${SIGNED_APK}" ]; then
            APK_PATH="${SIGNED_APK}"
          else
            APK_PATH="$(find app/build/outputs/apk/nonRoot_game/release -name '*arm64*unsigned*.apk' | head -1)"
          fi

          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV

      - name: Generate checksum
        run: sha256sum "${APK_PATH}" > "${APK_PATH}.sha256"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: nova-release-apk
          path: |
            ${{ env.APK_PATH }}
            ${{ env.APK_PATH }}.sha256
          if-no-files-found: error
          retention-days: 3

      - name: Upload GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for file in "${APK_PATH}" "${APK_PATH}.sha256"; do
            if [ ! -f "$file" ]; then
              echo "Missing release asset: $file" >&2
              exit 1
            fi
          done

          if ! gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" \
              --verify-tag \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes
          fi

          gh release upload "${GITHUB_REF_NAME}" "${APK_PATH}" "${APK_PATH}.sha256" --clobber

      - name: Verify GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          asset_count=$(gh release view "${GITHUB_REF_NAME}" --json assets --jq '.assets | length')
          if [ "${asset_count}" -lt 2 ]; then
            echo "Expected at least 2 release assets on ${GITHUB_REF_NAME}, found ${asset_count}" >&2
            exit 1
          fi
